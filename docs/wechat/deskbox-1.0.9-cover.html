<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskBox 1.0.9 Cover</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: rgba(255, 255, 255, 0.78);
      --line: rgba(26, 55, 106, 0.10);
      --text: #122033;
      --muted: #617086;
      --accent: #2b73ff;
      --accent-soft: rgba(43, 115, 255, 0.12);
      --shadow: 0 24px 60px rgba(35, 61, 104, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 22%, rgba(43, 115, 255, 0.12), transparent 28%),
        radial-gradient(circle at 85% 72%, rgba(116, 167, 255, 0.14), transparent 26%),
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 1175px;
      height: 500px;
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(248,250,255,0.92));
      border: 1px solid rgba(81, 114, 172, 0.18);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(43, 115, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(43, 115, 255, 0.05) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 92%);
      pointer-events: none;
    }

    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 10px;
      background: linear-gradient(90deg, #3b82f6 0%, #5b8ff7 52%, #8fb4ff 100%);
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      padding: 54px 58px 46px;
      align-items: center;
    }

    .copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      color: var(--text);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .title {
      margin: 0;
      font-size: 64px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: 0;
      color: #0f1f34;
    }

    .subtitle {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      color: var(--muted);
      letter-spacing: 0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .tag {
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      color: #31445f;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(66, 94, 145, 0.08);
    }

    .meta {
      margin-top: 12px;
      font-size: 18px;
      color: #5d6d83;
      line-height: 1.7;
    }

    .preview {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-stack {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 340px;
    }

    .panel {
      position: absolute;
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid rgba(64, 93, 148, 0.14);
      box-shadow: 0 18px 40px rgba(31, 52, 88, 0.10);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel.top {
      top: 24px;
      right: 18px;
      width: 360px;
      height: 250px;
      transform: rotate(2deg);
    }

    .panel.bottom {
      bottom: 18px;
      left: 34px;
      width: 390px;
      height: 276px;
      transform: rotate(-2.5deg);
    }

    .panel-header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(247,250,255,0.72));
      border-bottom: 1px solid rgba(64, 93, 148, 0.10);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(91, 111, 137, 0.25);
    }

    .dot.blue { background: var(--accent); }

    .panel-title {
      font-size: 15px;
      color: #41556f;
      font-weight: 600;
    }

    .panel-body {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .row {
      height: 18px;
      border-radius: 999px;
      background: rgba(27, 43, 68, 0.06);
    }

    .row.blue { background: linear-gradient(90deg, rgba(43,115,255,0.90), rgba(116,167,255,0.48)); }
    .row.short { width: 72%; }
    .row.mid { width: 88%; }
    .row.long { width: 100%; }

    .tile-grid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .tile {
      height: 74px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(240,245,255,0.85));
      border: 1px solid rgba(43, 115, 255, 0.10);
      display: flex;
      align-items: end;
      padding: 12px;
      color: #29405f;
      font-size: 15px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .tile.highlight {
      background: linear-gradient(180deg, rgba(43, 115, 255, 0.14), rgba(255,255,255,0.96));
      color: #1f4fa8;
      border-color: rgba(43, 115, 255, 0.24);
    }

    .footer-badge {
      position: absolute;
      right: 22px;
      bottom: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(43,115,255,0.14);
      color: #385272;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="accent-bar"></div>
    <div class="content">
      <section class="copy">
        <div class="eyebrow">DeskBox 1.0.9</div>
        <h1 class="title">Windows 桌面整理工具</h1>
        <p class="subtitle">把设置、拖拽、随记和层级问题集中修了一遍</p>
        <div class="tags">
          <span class="tag">设置重构</span>
          <span class="tag">拖拽稳定</span>
          <span class="tag">随记优化</span>
          <span class="tag">排序模式</span>
        </div>
        <p class="meta">更像 Windows 原生一点，也更像一个长期会继续打磨的桌面工具。</p>
      </section>

      <section class="preview" aria-label="DeskBox cover preview">
        <div class="panel-stack">
          <div class="panel bottom">
            <div class="panel-header">
              <div class="dots"><span class="dot blue"></span><span class="dot"></span><span class="dot"></span></div>
              <div class="panel-title">Quick Capture</div>
            </div>
            <div class="panel-body">
              <div class="row blue long"></div>
              <div class="row mid"></div>
              <div class="row short"></div>
              <div class="tile-grid">
                <div class="tile highlight">随记</div>
                <div class="tile">固定</div>
                <div class="tile">最近</div>
              </div>
            </div>
          </div>

          <div class="panel top">
            <div class="panel-header">
              <div class="dots"><span class="dot blue"></span><span class="dot"></span><span class="dot"></span></div>
              <div class="panel-title">Settings</div>
            </div>
            <div class="panel-body">
              <div class="row blue mid"></div>
              <div class="row long"></div>
              <div class="row mid"></div>
              <div class="row short"></div>
            </div>
          </div>
        </div>
        <div class="footer-badge">Release 1.0.9</div>
      </section>
    </div>
  </div>
</body>
</html>
